<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authority Profile - CIVIX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/theme.css" rel="stylesheet">
    <style>
        body { background: var(--bg-body, #f8fafc); color: var(--text-primary, #1e293b); font-family: "Segoe UI", sans-serif; min-height: 100vh; }
        .profile-card { background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: none; overflow: hidden; }
        .profile-header { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: #fff; padding: 40px 20px; text-align: center; position: relative; }
        .avatar-wrapper { width: 120px; height: 120px; border-radius: 50%; background: #fff; margin: 0 auto -60px; position: relative; z-index: 2; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(0,0,0,0.15); border: 4px solid #fff; }
        .avatar-wrapper i { font-size: 50px; color: #3b82f6; }
        .profile-body { padding: 80px 40px 40px; }
        .stat-card { background: #f1f5f9; border-radius: 12px; padding: 15px; text-align: center; transition: 0.3s; }
        .stat-card:hover { transform: translateY(-3px); background: #e2e8f0; }
        .stat-val { font-size: 1.5rem; font-weight: 700; color: #1e293b; display: block; }
        .stat-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-label { font-weight: 600; color: #475569; font-size: 0.85rem; }
        .form-control-plaintext { font-weight: 700; font-size: 1.1rem; color: #1e293b; padding-bottom: 0; }
        .btn-premium { border-radius: 10px; font-weight: 600; padding: 10px 20px; transition: 0.3s; }
        #civix-toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .civix-toast { background: #1e293b; color: #f8fafc; padding: 12px 20px; border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); animation: slideIn 0.3s ease; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

<div id="civix-toast-container"></div>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#" onclick="goToDashboard()"><i class="fas fa-city me-2"></i>CIVIX Authority</a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <a class="nav-link text-white small fw-bold" href="#" onclick="goToDashboard()"><i class="fas fa-th-large me-1"></i> Dashboard</a>
            <a class="nav-link text-white small fw-bold" href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-1"></i> Logout</a>
            <button class="btn btn-sm btn-light rounded-circle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="profile-card">
                <div class="profile-header">
                    <h3 class="fw-bold mb-0">Officer Profile</h3>
                    <p class="opacity-75 mb-0">Manage your official credentials</p>
                </div>
                <div class="avatar-wrapper">
                    <i class="fas fa-user-tie"></i>
                </div>
                <div class="profile-body">
                    <div class="row g-4 mb-5">
                        <div class="col-4"><div class="stat-card"><span class="stat-val" id="stat-processed">0</span><span class="stat-label">Processed</span></div></div>
                        <div class="col-4"><div class="stat-card"><span class="stat-val" id="stat-resolved">0</span><span class="stat-label">Resolved</span></div></div>
                        <div class="col-4"><div class="stat-card"><span class="stat-val" id="stat-rating">4.8</span><span class="stat-label">Rating</span></div></div>
                    </div>

                    <form id="profileForm">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label">Full Name</label>
                                <div id="display-name" class="form-control-plaintext">Authority User</div>
                                <input type="text" class="form-control d-none" id="edit-name">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email Address</label>
                                <div id="display-email" class="form-control-plaintext">authority@civix.gov</div>
                                <input type="email" class="form-control d-none" id="edit-email">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Authority Level</label>
                                <div class="mt-1">
                                    <span class="badge bg-primary-subtle text-primary border border-primary-subtle px-3 py-2 rounded-pill fw-bold" id="display-level">LEVEL 1</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Jurisdiction</label>
                                <div id="display-jurisdiction" class="form-control-plaintext">Central Municipality</div>
                            </div>
                        </div>

                        <div class="mt-5 d-flex gap-3">
                            <button type="button" class="btn btn-outline-secondary btn-premium px-4" onclick="goToDashboard()">
                                <i class="fas fa-arrow-left me-2"></i>Back
                            </button>
                            <button type="button" class="btn btn-primary btn-premium flex-grow-1" id="btn-edit" onclick="toggleEdit()">
                                <i class="fas fa-edit me-2"></i>Edit Profile
                            </button>
                            <button type="button" class="btn btn-success btn-premium flex-grow-1 d-none" id="btn-save" onclick="saveProfile()">
                                <i class="fas fa-save me-2"></i>Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/theme.js"></script>
<script>
    let isEditing = false;

    document.addEventListener('DOMContentLoaded', () => {
        loadData();
    });

    function loadData() {
        const user = JSON.parse(localStorage.getItem('currentUser') || localStorage.getItem('user') || '{}');
        const profile = JSON.parse(localStorage.getItem('authorityProfile') || '{}');
        
        document.getElementById('display-name').textContent = profile.name || user.name || 'Authority User';
        document.getElementById('display-email').textContent = profile.email || user.email || 'authority@civix.gov';
        document.getElementById('display-level').textContent = (user.authority_level || 'ward').toUpperCase() + ' LEVEL';
        document.getElementById('display-jurisdiction').textContent = user.district || 'All Jurisdictions';

        // Load some dummy stats
        document.getElementById('stat-processed').textContent = Math.floor(Math.random() * 50) + 20;
        document.getElementById('stat-resolved').textContent = Math.floor(Math.random() * 20) + 10;
    }

    function toggleEdit() {
        isEditing = !isEditing;
        const displayFields = ['name', 'email'];
        displayFields.forEach(f => {
            document.getElementById(`display-${f}`).classList.toggle('d-none');
            const input = document.getElementById(`edit-${f}`);
            input.classList.toggle('d-none');
            if (isEditing) input.value = document.getElementById(`display-${f}`).textContent;
        });

        document.getElementById('btn-edit').classList.toggle('d-none');
        document.getElementById('btn-save').classList.toggle('d-none');
    }

    function saveProfile() {
        const name = document.getElementById('edit-name').value;
        const email = document.getElementById('edit-email').value;
        
        localStorage.setItem('authorityProfile', JSON.stringify({ name, email }));
        showToast('Profile updated successfully!');
        loadData();
        toggleEdit();
    }

    function showToast(msg) {
        const container = document.getElementById('civix-toast-container');
        const t = document.createElement('div');
        t.className = 'civix-toast';
        t.innerHTML = `<i class="fas fa-check-circle text-success"></i> <span>${msg}</span>`;
        container.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    function goToDashboard() {
        // Redirect to / so router.js can load the correct dashboard based on localStorage
        window.location.href = '/';
    }

    function logout() {
        if (confirm('Are you sure you want to logout?')) {
            localStorage.removeItem("currentUser");
            localStorage.removeItem("user");
            localStorage.removeItem("token");
            localStorage.removeItem("civix_page");
            localStorage.removeItem("currentRoleName");
            localStorage.removeItem("currentEmail");
            sessionStorage.clear();
            fetch('/api/logout/', { method: 'POST', credentials: 'include' }).finally(() => {
                window.location.href = '/index.html?page=login';
            });
        }
    }
</script>
</body>
</html>
